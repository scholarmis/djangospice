<div 
    id="{{ target_id }}" 
    hx-get="{{ target_url }}" 
    hx-trigger="load" 
    hx-swap="outerHTML"
    class="widget-placeholder"
>
    <div class="widget-loading-skeleton" aria-busy="true" aria-label="Loading {{ target_title }}">
        <div class="skeleton-header">
            <span class="skeleton-title">Loading {{ target_title }}...</span>
            <span class="skeleton-spinner"></span>
        </div>
        <div class="skeleton-body">
            <div class="skeleton-line"></div>
            <div class="skeleton-line short"></div>
        </div>
    </div>
</div>
